; Bimano CRM — PHP runtime settings for Hostinger (PHP-FPM)
; This file is loaded automatically by PHP-FPM on shared hosts.
; It applies to all PHP files in this directory and subdirectories.

; ── Error handling ────────────────────────────────────────────────────────────
display_errors       = Off
display_startup_errors = Off
log_errors           = On
error_reporting      = 32767

; ── Session security ──────────────────────────────────────────────────────────
session.cookie_httponly  = 1
session.cookie_samesite  = Strict
session.use_strict_mode  = 1
session.gc_maxlifetime   = 7200

; ── Upload / execution limits ─────────────────────────────────────────────────
upload_max_filesize = 10M
post_max_size       = 12M
max_execution_time  = 60
memory_limit        = 256M
